name: Build and push images

# När ska detta köras? Vid varje push till main-grenen.
on:
  push:
    branches: [main]

# Behörigheter workflow:en behöver för att kunna pusha till ghcr.io
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    # Bygg båda images via en matris – samma steg körs en gång per service.
    strategy:
      matrix:
        include:
          - name: frontend
            context: ./wigellfrontend
          - name: backend
            context: ./koncernensBackend/carRentalBackend

    steps:
      # Hämta ut koden från repot till byggservern
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU låter x86-byggservern bygga för ARM64 (Pi:ns arkitektur)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # buildx är Dockers utökade byggare som klarar multi-arch
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Logga in på GitHub Container Registry med inbyggd token
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Bygg imagen för ARM64 och pusha den till ghcr.io
      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/wigell-${{ matrix.name }}:latest
